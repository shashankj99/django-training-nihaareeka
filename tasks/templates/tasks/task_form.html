{% extends "tasks/base.html" %}

{% block title %}{{ action }} Task{% endblock %}

{% block content %}
<h1>{{ action }} Task</h1>

<form method="POST" style="margin-top: 15px;">
    {% csrf_token %}

    {% for field in form %}
    <div style="margin-bottom: 15px;">
        <label style="display:block; font-weight:bold; margin-bottom:5px;">
            {{ field.label }}
        </label>
        {{ field }}
        {% if field.errors %}
        <p style="color:red; font-size:0.9em;">{{ field.errors.0 }}</p>
        {% endif %}
    </div>
    {% endfor %}

    <button type="submit" class="btn" style="border:none; cursor:pointer; font-size:1em; padding:10px 24px;">
        {{ action }} Task
    </button>
    <a href="{% url 'task_list' %}" style="margin-left:10px;">Cancel</a>
</form>

<style>
    .form-input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1em;
    }
</style>
{% endblock %}
